<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MOSSARI TRAVEL - Custom Ticket Gen</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap');

:root {
  --bg: #1a1a2e; --paper: #16213e; --paper2: #0f3460;
  --sage: #4ade80; --accent: #e11d48;
  --ticket-bg: #fffbf0; --ticket-line: #d4a843;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Space Mono', monospace;
  background: var(--bg); color: #fff;
  display: flex; flex-direction: column; align-items: center; padding: 20px;
}

h1 { font-family: 'Press Start 2P', cursive; font-size: 1rem; margin-bottom: 20px; color: var(--sage); letter-spacing: -1px; }

.main-container {
  display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 900px;
}

/* Controls Panel */
.panel {
  flex: 1; min-width: 320px; background: var(--paper); padding: 20px; border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.input-group { margin-bottom: 15px; }
label { display: block; font-size: 0.7rem; color: #94a3b8; margin-bottom: 6px; letter-spacing: 1px; }
input, select, textarea {
  width: 100%; padding: 12px; background: var(--paper2); border: 1px solid #1f4068;
  color: #fff; border-radius: 8px; font-family: inherit; outline: none;
}
input:focus { border-color: var(--sage); }

.btn {
  width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer;
  font-weight: bold; margin-bottom: 10px; transition: 0.2s; font-family: inherit;
}
.btn-primary { background: var(--sage); color: #1a1a2e; }
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-sub { background: #475569; color: white; }

/* Canvas Area */
.preview-area { flex: 1; min-width: 340px; text-align: center; }
#ticketCanvas {
  max-width: 100%; height: auto; border-radius: 4px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

/* Modal Styling */
.modal {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
}
.modal-content { max-width: 100%; max-height: 70vh; margin-bottom: 20px; }
#qrcode { background: white; padding: 20px; border-radius: 8px; }

.toast {
  position: fixed; bottom: 20px; background: var(--sage); color: #1a1a2e;
  padding: 10px 20px; border-radius: 20px; font-weight: bold; display: none; z-index: 3000;
}
</style>
</head>
<body>

<h1>MOSSARI TRAVEL TICKET</h1>

<div class="main-container">
  <div class="panel">
    <div class="input-group">
      <label>PASSENGER & DESTINATION</label>
      <input type="text" id="i-dest" placeholder="NAME / TOKYO" oninput="draw()">
    </div>

    <div class="input-group">
      <label>TRANSPORT</label>
      <select id="i-transport" onchange="draw()">
        <option value="✈️">AIRPLANE (✈️)</option>
        <option value="🚌">BUS (🚌)</option>
        <option value="🚲">BICYCLE (🚲)</option>
        <option value="🚢">SHIP (🚢)</option>
        <option value="🚶">WALK (🚶)</option>
        <option value="🛸">UFO (🛸)</option>
      </select>
    </div>

    <div class="input-group">
      <label>TRAVEL DATES</label>
      <div style="display:flex; gap:8px;">
        <input type="text" id="i-date-start" placeholder="2026.03.18" oninput="draw()">
        <input type="text" id="i-date-end" placeholder="03.20" oninput="draw()">
      </div>
    </div>

    <div class="input-group">
      <label>MESSAGE</label>
      <textarea id="i-msg" rows="2" oninput="draw()" placeholder="Have a nice trip!"></textarea>
    </div>

    <div class="input-group">
      <label>CHARACTER (CUSTOM KOKE)</label>
      <input type="file" id="koke-upload" accept="image/*" style="display:none" onchange="startCrop(event)">
      <button class="btn btn-sub" onclick="document.getElementById('koke-upload').click()">写真をアップロードして作成</button>
    </div>

    <button class="btn btn-primary" onclick="saveHighRes()">💾 高画質画像を保存</button>
    <button class="btn btn-sub" onclick="showQR()">🔗 QRコードを表示</button>
  </div>

  <div class="preview-area">
    <canvas id="ticketCanvas"></canvas>
    <p style="font-size: 0.6rem; color: #64748b; margin-top: 10px;">PREVIEW (Low Res)</p>
  </div>
</div>

<div id="cropModal" class="modal">
  <div class="modal-content">
    <img id="cropTarget" style="max-width: 100%;">
  </div>
  <div style="display:flex; gap:10px; width: 100%; max-width: 400px;">
    <button class="btn btn-primary" onclick="applyCrop()">切り抜き＆目玉追加</button>
    <button class="btn btn-sub" onclick="closeModal('cropModal')">キャンセル</button>
  </div>
</div>

<div id="qrModal" class="modal" onclick="closeModal('qrModal')">
  <div id="qrcode"></div>
  <p style="color: white; margin-top: 15px; font-size: 0.8rem;">tokoyami00.github.io/mossari/</p>
  <p style="color: #64748b; margin-top: 5px;">タップして閉じる</p>
</div>

<div id="toast" class="toast">Saved!</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
let cropper = null;
let kokeImage = null; // Base64 of processed koke
const BASE_W = 340;
const BASE_H = 500;

window.onload = () => { draw(); };

function draw(scale = 1) {
  const canvas = document.getElementById('ticketCanvas');
  const ctx = canvas.getContext('2d');
  
  canvas.width = BASE_W * scale;
  canvas.height = BASE_H * scale;
  ctx.scale(scale, scale);

  // 1. Background
  ctx.fillStyle = '#fffbf0';
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  // 2. Decorative Border & Lines
  ctx.strokeStyle = '#d4a843';
  ctx.lineWidth = 1;
  ctx.strokeRect(10, 10, BASE_W - 20, BASE_H - 20);
  
  // Dotted Line
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(10, 380); ctx.lineTo(330, 380);
  ctx.stroke();
  ctx.setLineDash([]);

  // 3. Header
  ctx.fillStyle = '#1a1a2e';
  ctx.font = "bold 20px 'Space Mono'";
  ctx.textAlign = 'center';
  const dest = document.getElementById('i-dest').value || 'PASSENGER / TOKYO';
  ctx.fillText(dest.toUpperCase(), BASE_W/2, 50);

  // 4. Transport Icon
  const transport = document.getElementById('i-transport').value;
  ctx.font = "48px serif";
  ctx.fillText(transport, BASE_W/2, 115);

  // 5. Date Range
  const dStart = document.getElementById('i-date-start').value || '2026.03.18';
  const dEnd = document.getElementById('i-date-end').value || '03.20';
  ctx.fillStyle = '#d4a843';
  ctx.font = "bold 14px 'Space Mono'";
  ctx.fillText(`${dStart} >> ${dEnd}`, BASE_W/2, 155);

  // 6. Character Area
  if (kokeImage) {
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, BASE_W/2 - 70, 185, 140, 140);
    };
    img.src = kokeImage;
  } else {
    // Default placeholder circle
    ctx.fillStyle = '#e2e8f0';
    ctx.beginPath(); ctx.arc(BASE_W/2, 255, 60, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#94a3b8';
    ctx.font = "8px 'Press Start 2P'";
    ctx.fillText("NO KOKE", BASE_W/2, 260);
  }

  // 7. Footer Message
  ctx.fillStyle = '#1a1a2e';
  ctx.font = "italic 20px 'Caveat'";
  const msg = document.getElementById('i-msg').value || 'Have a nice mossari trip!';
  ctx.fillText(msg, BASE_W/2, 430);

  // 8. Punched Hole Style
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.arc(10, 380, 8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(330, 380, 8, 0, Math.PI*2); ctx.fill();
}

/* Cropper Logic */
function startCrop(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    const img = document.getElementById('cropTarget');
    img.src = event.target.result;
    document.getElementById('cropModal').style.display = 'flex';
    if (cropper) cropper.destroy();
    cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1 });
  };
  reader.readAsDataURL(file);
}

function applyCrop() {
  const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
  const ctx = canvas.getContext('2d');
  
  // 目玉の描画 (MOSSARI Style)
  const drawEye = (x, y) => {
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.ellipse(x, y, 22, 28, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.stroke();
    ctx.fillStyle = 'black';
    ctx.beginPath(); ctx.arc(x, y + 5, 10, 0, Math.PI*2); ctx.fill();
  };
  
  drawEye(200 - 60, 180); // 左
  drawEye(200 + 60, 180); // 右
  
  kokeImage = canvas.toDataURL();
  closeModal('cropModal');
  draw();
}

/* Save & QR Logic */
function saveHighRes() {
  draw(3); // 3倍サイズで再描画
  setTimeout(() => {
    const link = document.createElement('a');
    link.download = 'mossari-travel-hq.png';
    link.href = document.getElementById('ticketCanvas').toDataURL('image/png');
    link.click();
    draw(1); // プレビュー用に戻す
    showToast("SUCCESS: HQ IMAGE SAVED");
  }, 200);
}

function showQR() {
  const qrContainer = document.getElementById('qrcode');
  qrContainer.innerHTML = "";
  new QRCode(qrContainer, {
    text: "https://tokoyami00.github.io/mossari/",
    width: 160, height: 160
  });
  document.getElementById('qrModal').style.display = 'flex';
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2000);
}
</script>
</body>
</html>
