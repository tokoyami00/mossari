<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MOSSARI TRAVEL - Ticket Generator</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap');

:root {
  --bg: #1a1a2e;
  --paper: #16213e;
  --sage: #4ade80;
  --accent: #e11d48;
  --ticket-bg: #fffbf0;
  --ticket-line: #d4a843;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Space Mono', monospace;
  background: var(--bg);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h1 { font-family: 'Press Start 2P', cursive; font-size: 1.2rem; margin-bottom: 20px; color: var(--sage); }

/* UI Container */
.container { width: 100%; max-width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 600px) { .container { grid-template-columns: 1fr; } }

.panel { background: var(--paper); padding: 20px; border-radius: 12px; }

/* Form Elements */
.input-group { margin-bottom: 15px; }
label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
input, select, textarea {
  width: 100%; padding: 10px; background: #0f3460; border: 1px solid #1f4068;
  color: #fff; border-radius: 6px; font-family: inherit;
}
.btn {
  width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer;
  font-weight: bold; margin-bottom: 10px; transition: 0.2s;
}
.btn-primary { background: var(--sage); color: #1a1a2e; }
.btn-accent { background: var(--accent); color: #fff; }

/* Preview Canvas */
#ticketCanvas { max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

/* Modal for Cropping & QR */
.modal {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
}
.modal-content { max-width: 90%; max-height: 70%; margin-bottom: 20px; }
#qrcode { background: white; padding: 20px; border-radius: 10px; }
</style>
</head>
<body>

<h1>MOSSARI TRAVEL</h1>

<div class="container">
  <div class="panel">
    <div class="input-group">
      <label>DESTINATION</label>
      <input type="text" id="i-dest" placeholder="TOKYO, JAPAN" oninput="updatePreview()">
    </div>
    
    <div class="input-group">
      <label>DATES (START ~ END)</label>
      <div style="display:flex; gap:5px; align-items:center;">
        <input type="text" id="i-date-start" placeholder="2026.03.18" oninput="updatePreview()">
        <span>~</span>
        <input type="text" id="i-date-end" placeholder="03.20" oninput="updatePreview()">
      </div>
    </div>

    <div class="input-group">
      <label>TRANSPORT</label>
      <select id="i-transport" onchange="updatePreview()">
        <option value="✈️">Airplane (✈️)</option>
        <option value="🚌">Bus (🚌)</option>
        <option value="🚲">Bicycle (🚲)</option>
        <option value="🚶">Walk (🚶)</option>
        <option value="🚢">Ship (🚢)</option>
      </select>
    </div>

    <div class="input-group">
      <label>CUSTOM KOKE (UPLOAD PHOTO)</label>
      <input type="file" id="koke-upload" accept="image/*" onchange="initCrop(event)">
    </div>

    <button class="btn btn-primary" onclick="saveHighRes()">高画質で保存する</button>
    <button class="btn" style="background:#475569" onclick="showQR()">サイトのQRを表示</button>
  </div>

  <div class="panel" style="text-align:center;">
    <canvas id="ticketCanvas"></canvas>
  </div>
</div>

<div id="cropModal" class="modal">
  <div class="modal-content">
    <img id="cropImage" style="max-width:100%;">
  </div>
  <button class="btn btn-primary" style="width:200px;" onclick="applyCrop()">切り取ってコケにする</button>
</div>

<div id="qrModal" class="modal" onclick="this.style.display='none'">
  <div id="qrcode"></div>
  <p style="margin-top:20px; font-size:0.8rem;">タップして閉じる</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
let cropper = null;
let customKokeBase64 = null;

// Initial Update
window.onload = updatePreview;

function updatePreview() {
  drawTicket(1); // プレビュー用（低解像度）
}

function initCrop(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    const img = document.getElementById('cropImage');
    img.src = event.target.result;
    document.getElementById('cropModal').style.display = 'flex';
    if(cropper) cropper.destroy();
    cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1 });
  };
  reader.readAsDataURL(file);
}

function applyCrop() {
  const canvas = cropper.getCroppedCanvas({ width: 300, height: 300 });
  const ctx = canvas.getContext('2d');
  
  // 「目玉」を描画する
  const drawEye = (x, y) => {
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.ellipse(x, y, 18, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = 'black';
    ctx.beginPath();
    ctx.arc(x, y + 4, 8, 0, Math.PI * 2);
    ctx.fill();
  };
  
  drawEye(150 - 45, 140); // 左目
  drawEye(150 + 45, 140); // 右目
  
  customKokeBase64 = canvas.toDataURL();
  document.getElementById('cropModal').style.display = 'none';
  updatePreview();
}

function drawTicket(scale) {
  const canvas = document.getElementById('ticketCanvas');
  const ctx = canvas.getContext('2d');
  
  const baseW = 340;
  const baseH = 480;
  canvas.width = baseW * scale;
  canvas.height = baseH * scale;
  ctx.scale(scale, scale);

  // Background
  ctx.fillStyle = '#fffbf0';
  ctx.fillRect(0, 0, baseW, baseH);

  // Ticket Border
  ctx.strokeStyle = '#d4a843';
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 10, baseW-20, baseH-20);

  // Text: Destination
  ctx.fillStyle = '#1a1a2e';
  ctx.font = "bold 24px 'Space Mono'";
  ctx.textAlign = 'center';
  ctx.fillText(document.getElementById('i-dest').value || 'DESTINATION', baseW/2, 60);

  // Transport Icon
  ctx.font = "50px serif";
  ctx.fillText(document.getElementById('i-transport').value, baseW/2, 130);

  // Dates
  const d1 = document.getElementById('i-date-start').value || 'YYYY.MM.DD';
  const d2 = document.getElementById('i-date-end').value || 'DD';
  ctx.font = "16px 'Space Mono'";
  ctx.fillStyle = '#d4a843';
  ctx.fillText(`${d1} ~ ${d2}`, baseW/2, 170);

  // Main Koke Image
  if(customKokeBase64) {
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, baseW/2 - 75, 210, 150, 150);
    };
    img.src = customKokeBase64;
  } else {
    // Default placeholder
    ctx.fillStyle = '#4ade80';
    ctx.beginPath();
    ctx.arc(baseW/2, 285, 60, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.font = "10px 'Press Start 2P'";
    ctx.fillText("NO KOKE", baseW/2, 290);
  }

  // Footer Message
  ctx.font = "italic 18px 'Caveat'";
  ctx.fillStyle = '#64748b';
  ctx.fillText("Have a nice mossari trip!", baseW/2, 430);
}

function saveHighRes() {
  // 保存用に一時的なキャンバスを作成（3倍の解像度）
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = 340 * 3;
  tempCanvas.height = 480 * 3;
  
  // 再描画の完了を待つために100ms待機
  drawTicket(3); 
  setTimeout(() => {
    const a = document.createElement('a');
    a.download = 'mossari-ticket-hq.png';
    a.href = document.getElementById('ticketCanvas').toDataURL('image/png');
    a.click();
    drawTicket(1); // プレビューに戻す
  }, 100);
}

function showQR() {
  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = "";
  new QRCode(qrDiv, {
    text: "https://tokoyami00.github.io/mossari/",
    width: 180,
    height: 180
  });
  document.getElementById('qrModal').style.display = 'flex';
}
</script>
</body>
</html>
